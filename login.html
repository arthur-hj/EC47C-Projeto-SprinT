<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SprinT</title>
    <link rel="stylesheet" href="style-login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined">
</head>
<body>
    <header>
        <a href="#" class="logo"><img src="assets/sprint_logo_transparent-1.svg" alt="Logo SprinT"></a>
    </header>
    <section id="login">
        <div class="circulo c1"></div>
        <div class="circulo c2"></div>

        <div class="caixa-login">
            <form action="principal.html" class="forms">
                <div class="respostas">
                    <h2 class="titulo-login">Login</h2>
                    <p class="tag-login">Email</p>
                    <input type="email" placeholder="fulano@alunos.utfpr.edu.br" required class="caixa-resposta">
                    <p class="tag-login">Senha</p>
                    <input type="password" required class="caixa-resposta">
                </div>
                <div class="botao">
                    <button type="submit" class="botao-login">Login</button>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
